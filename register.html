<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" /><title>Đăng ký - FitTrack</title></head><body class="auth-page"><div class="container py-4"><div class="auth-card"><div class="row g-0"><div class="col-lg-5"><div class="auth-visual h-100"><div class="brand-mark mb-4">🏋️</div><h1 class="fw-black">Tạo hồ sơ sức khỏe cá nhân.</h1><p class="opacity-75">Thông tin ban đầu giúp FitTrack tính BMI tham khảo, mục tiêu tuần và thống kê cá nhân.</p><div class="auth-feature">🎯 Mục tiêu tập luyện riêng</div><div class="auth-feature">💧 Theo dõi nước uống, giấc ngủ</div><div class="auth-feature">⚡ Tổng quan tiến độ tuần</div></div></div><div class="col-lg-7"><div class="auth-form"><p class="section-kicker mb-1">Tạo tài khoản</p><h2 class="fw-black mb-3">Đăng ký tài khoản</h2><form id="registerForm" novalidate><div class="row g-3"><div class="col-md-6"><label class="form-label fw-bold">Họ tên</label><input id="fullName" class="form-control"><small class="text-danger error-message" id="fullNameError"></small></div><div class="col-md-6"><label class="form-label fw-bold">Email</label><input id="email" type="email" class="form-control"><small class="text-danger error-message" id="emailError"></small></div><div class="col-md-6"><label class="form-label fw-bold">Số điện thoại</label><input id="phone" class="form-control" placeholder="0987654321"><small class="text-danger error-message" id="phoneError"></small></div><div class="col-md-6"><label class="form-label fw-bold">Mật khẩu</label><input id="password" type="password" class="form-control"><small class="text-danger error-message" id="passwordError"></small></div><div class="col-md-6"><label class="form-label fw-bold">Xác nhận mật khẩu</label><input id="confirmPassword" type="password" class="form-control"><small class="text-danger error-message" id="confirmPasswordError"></small></div><div class="col-md-4"><label class="form-label fw-bold">Tuổi</label><input id="age" type="number" class="form-control"><small class="text-danger error-message" id="ageError"></small></div><div class="col-md-4"><label class="form-label fw-bold">Giới tính</label><select id="gender" class="form-select"><option value="">Chọn</option><option>Nam</option><option>Nữ</option><option>Khác</option></select><small class="text-danger error-message" id="genderError"></small></div><div class="col-md-4"><label class="form-label fw-bold">Mục tiêu</label><select id="goal" class="form-select"><option value="">Chọn</option><option>Giảm mỡ</option><option>Tăng cơ</option><option>Tăng sức bền</option><option>Duy trì sức khỏe</option></select><small class="text-danger error-message" id="goalError"></small></div><div class="col-md-6"><label class="form-label fw-bold">Chiều cao</label><div class="input-group"><input id="height" type="number" class="form-control"><span class="input-group-text">cm</span></div><small class="text-danger error-message" id="heightError"></small></div><div class="col-md-6"><label class="form-label fw-bold">Cân nặng</label><div class="input-group"><input id="weight" type="number" class="form-control"><span class="input-group-text">kg</span></div><small class="text-danger error-message" id="weightError"></small></div></div><button id="registerBtn" class="btn btn-success btn-lg w-100 mt-4">Đăng ký tài khoản</button></form><p class="text-center text-muted mt-4 mb-0">Đã có tài khoản? <a class="fw-bold text-success" href="login.html">Đăng nhập</a></p></div></div></div></div></div><div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="appToast" class="toast border-0 shadow"><div class="toast-header"><strong class="me-auto" id="toastTitle">Thông báo</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div><div class="toast-body" id="toastMessage"></div></div></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="js/api.js"></script><script src="js/utils.js"></script><script src="js/auth.js"></script><script>$(document).ready(initRegisterPage);</script></body></html>
